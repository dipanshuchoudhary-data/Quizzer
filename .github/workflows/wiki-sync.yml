name: Sync Wiki

on:
  push:
    branches:
      - main
    paths:
      - "docs/wiki/**"

permissions:
  contents: write

jobs:
  sync-wiki:
    name: Sync docs/wiki to GitHub Wiki
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Push wiki pages to GitHub Wiki
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          # Clone the wiki repository
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki-repo

          # Copy all markdown files from docs/wiki/ into the wiki repo root
          cp docs/wiki/*.md wiki-repo/

          # Commit and push if there are changes
          cd wiki-repo
          git add .
          if git diff --cached --quiet; then
            echo "No wiki changes to push."
          else
            git commit -m "docs: sync wiki from docs/wiki/ [skip ci]"
            git push origin master
          fi
